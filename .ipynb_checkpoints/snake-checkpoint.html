<!DOCTYPE html><html><head><title>Snake Game</title><style>canvas { border: 1px solid black; }</style></head><body><canvas id='canvas' width='400' height='400'></canvas><script>const canvas = document.getElementById('canvas');const ctx = canvas.getContext('2d');let snake = [[200, 200], [220, 200], [240, 200]];let direction = 'right';let food = [100, 100];let score = 0;let speed = 100;let intervalId;setInterval(() => {ctx.clearRect(0, 0, canvas.width, canvas.height);drawSnake();drawFood();updateSnake();checkCollision();}, speed);document.addEventListener('keydown', (e) => {if (e.key === 'ArrowUp' && direction !== 'down') {direction = 'up';} else if (e.key === 'ArrowDown' && direction !== 'up') {direction = 'down';} else if (e.key === 'ArrowLeft' && direction !== 'right') {direction = 'left';} else if (e.key === 'ArrowRight' && direction !== 'left') {direction = 'right';}});function drawSnake() {for (let i = 0; i < snake.length; i++) {ctx.fillStyle = 'green';ctx.fillRect(snake[i][0], snake[i][1], 20, 20);}}function drawFood() {ctx.fillStyle = 'red';ctx.fillRect(food[0], food[1], 20, 20);}function updateSnake() {let head = snake[0];let newHead;if (direction === 'up') {newHead = [head[0], head[1] - 20];} else if (direction === 'down') {newHead = [head[0], head[1] + 20];} else if (direction === 'left') {newHead = [head[0] - 20, head[1]];} else if (direction === 'right') {newHead = [head[0] + 20, head[1]];}snake.unshift(newHead);if (snake[0][0] === food[0] && snake[0][1] === food[1]) {score++;food = [Math.floor(Math.random() * 20) * 20, Math.floor(Math.random() * 20) * 20];} else {snake.pop();}}function checkCollision() {if (snake[0][0] < 0 || snake[0][0] >= canvas.width || snake[0][1] < 0 || snake[0][1] >= canvas.height) {alert('Game Over');clearInterval(intervalId);} for (let i = 1; i < snake.length; i++) {if (snake[0][0] === snake[i][0] && snake[0][1] === snake[i][1]) {alert('Game Over');clearInterval(intervalId);}}}</script></body></html>
